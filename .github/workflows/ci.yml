name: CI

on:
  push:
    branches:
      - master
      - v*
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: OMP / Test

    runs-on: ubuntu-latest
    container:
      # Ubuntu 24.04 base ships CMake 3.28, above the 3.24 minimum (the old
      # 20.04 image only had 3.16).
      image: rootproject/root:6.32.04-ubuntu24.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure
      # ROOT 6.32 requires C++17, so build GooFit with a matching standard.
      run: cmake -S . -B build -DGOOFIT_DEVICE=OMP -DCMAKE_CXX_STANDARD=17
    - name: Build
      run: cmake --build build -j "$(getconf _NPROCESSORS_ONLN)"
    - name: Run Tests
      run: cmake --build build --target test
      env:
        CTEST_OUTPUT_ON_FAILURE: true
        GTEST_COLOR: true

  python:
    name: OMP / Python
    runs-on: ubuntu-latest
    container:
      # ROOT 6.34+ reworked the Minuit2 MnMigrad constructor; build the Python
      # bindings against it so that API break is caught here. This image ships
      # GCC 15 (whose libstdc++ drops std::allocator<>::reference), exercising
      # the modern bundled CCCL on the newest toolchain.
      image: rootproject/root:6.38.00-ubuntu25.10

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Python dev and test tools
      run: apt-get update && apt-get install -y python3-dev python3-numpy python3-pytest

    - name: Configure
      # ROOT 6.38 requires C++17. Only the Python bindings are needed here.
      run: >
        cmake -S . -B build
        -DGOOFIT_DEVICE=OMP
        -DGOOFIT_PYTHON=ON
        -DGOOFIT_TESTS=OFF
        -DGOOFIT_EXAMPLES=OFF
        -DCMAKE_CXX_STANDARD=17
    - name: Build
      run: cmake --build build -j "$(getconf _NPROCESSORS_ONLN)"
    - name: Run Python tests
      run: PYTHONPATH="$PWD/build" python3 -m pytest python/tests -v

  clang-tidy:
    runs-on: ubuntu-latest
    container: silkeh/clang:15
    steps:
    - name: Get Git
      run: apt update && apt install -y git
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: Configure
      run: >
        cmake -S . -B build
        -DCMAKE_CXX_CLANG_TIDY="$(which clang-tidy)"
        -DDOWNLOAD_EIGEN=ON
        -DDOWNLOAD_CATCH=ON
        -DCMAKE_CXX_STANDARD=17
    - name: Build
      run: cmake --build build -j 2 -- --keep-going



  cuda-build:
    name: CUDA / Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - 12.9.1-devel-ubuntu24.04
          - 13.0.1-devel-ubuntu24.04

    container: "nvidia/cuda:${{matrix.cuda}}"
    steps:
    # git must exist before checkout so submodules can be fetched; the CUDA
    # images do not ship it.
    - name: Add compiler, git, wget and python3
      # Only base Ubuntu packages are needed; drop the NVIDIA CUDA apt repo,
      # whose mirror is intermittently out of sync and fails apt-get update.
      run: |
        rm -f /etc/apt/sources.list.d/cuda*.list /etc/apt/sources.list.d/nvidia*.list
        apt-get update && apt-get install -y g++ make git wget python3-dev
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install Modern CMake
      run: wget -qO- "https://cmake.org/files/v3.31/cmake-3.31.6-linux-x86_64.tar.gz" | tar --strip-components=1 -xz -C /usr/local
    - name: Configure
      # CUDA 12/13 ship their own Thrust, so the bundled copy must be disabled.
      # arch 7.5 is the oldest supported by CUDA 13.
      run: >
        cmake -S . -B build
        -DGOOFIT_DEVICE=CUDA
        -DCMAKE_CUDA_ARCHITECTURES=75
        -DGOOFIT_FORCE_LOCAL_THRUST=OFF
        -DCMAKE_CXX_STANDARD=17
        -DCMAKE_CUDA_STANDARD=17
        -DGOOFIT_SPLASH=OFF
    - name: Build
      run: cmake --build build -j2 -v
    - name: Verify Python built
      run: PYTHONPATH=./build python3 -m goofit

  configure:
    name: Configure
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: CMake 3.24 OMP
      uses: ./.github/actions/cmake_config
      with:
        version: 3.24.0
        options: -DGOOFIT_DEVICE=OMP
      if: success() || failure()
    - name: CMake 3.24 CUDA
      uses: ./.github/actions/cmake_config
      with:
        version: 3.24.0
        options: -DGOOFIT_DEVICE=CUDA -DCMAKE_CUDA_ARCHITECTURES=75 -DGOOFIT_FORCE_LOCAL_THRUST=OFF -DCMAKE_CXX_STANDARD=17 -DCMAKE_CUDA_STANDARD=17
      if: success() || failure()

    - name: CMake 4.2 OMP
      uses: ./.github/actions/cmake_config
      with:
        version: 4.2.0
        options: -DGOOFIT_DEVICE=OMP
      if: success() || failure()
    - name: CMake 4.2.0 CUDA
      uses: ./.github/actions/cmake_config
      with:
        version: 4.2.0
        options: -DGOOFIT_DEVICE=CUDA -DCMAKE_CUDA_ARCHITECTURES=75 -DGOOFIT_FORCE_LOCAL_THRUST=OFF -DCMAKE_CXX_STANDARD=17 -DCMAKE_CUDA_STANDARD=17
      if: success() || failure()
